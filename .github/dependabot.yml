version: 2
updates:
  - package-ecosystem: composer
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    # Batch the weekly dev-tooling bumps into a single PR. With branch protection
    # set to strict + enforce_admins, one grouped PR means one merge instead of a
    # serial update-branch / re-run / merge dance across N separate PRs.
    groups:
      composer:
        patterns:
          - "*"
    labels:
      - dependencies
      - composer
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    # Same rationale: all Action SHA bumps land in one reviewable PR.
    groups:
      github-actions:
        patterns:
          - "*"
    labels:
      - dependencies
      - github-actions
