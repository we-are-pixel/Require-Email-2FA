name: Semgrep (PHP security)

# CodeQL cannot analyze PHP, so codeql.yml only covers the GitHub Actions workflows.
# This job covers the plugin's own PHP with Semgrep's PHP + security rulesets and
# reports findings to the Security tab (code scanning) via SARIF. It is report-only
# (non-blocking) for now: findings surface as alerts rather than failing the build.
#
# Actions are pinned to full commit SHAs and Semgrep to an exact version, matching
# the repo's supply-chain convention (see docs/SUPPLY-CHAIN-SECURITY.md).

on:
  push:
    branches: [ main ]
  pull_request:
  schedule:
    - cron: '30 5 * * 1'

permissions:
  contents: read

jobs:
  semgrep:
    name: Semgrep scan (PHP)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write # upload SARIF to code scanning
      actions: read # required for SARIF upload on private/internal repos
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: '3.12'

      - name: Install Semgrep
        run: pip install --no-cache-dir "semgrep==1.168.0"

      - name: Scan the plugin's PHP
        # Report-only for FINDINGS: without --error, `semgrep scan` exits 0 even when
        # it finds issues (they surface as code-scanning alerts via the SARIF upload).
        # A nonzero exit means a real scanner/config/rule failure, so let it fail the
        # job rather than silently uploading an empty or missing SARIF.
        run: |
          semgrep scan \
            --config p/php \
            --config p/security-audit \
            --sarif --output semgrep.sarif \
            force-email-two-factor.php mu-loader.php bin

      - name: Upload SARIF to code scanning
        if: always()
        uses: github/codeql-action/upload-sarif@7188fc363630916deb702c7fdcf4e481b751f97a # v4
        with:
          sarif_file: semgrep.sarif
          category: semgrep
