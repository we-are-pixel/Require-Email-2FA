name: Release

# Build the distributable plugin zip and publish it as a GitHub Release asset on
# every version tag (v1.2.3). The zip is what Plugin Update Checker downloads for
# in-place / auto-updates on installed sites.
#
# The sole runtime dependency (Plugin Update Checker) is committed under vendor/,
# so the build is just `git archive` — no Composer, no dependency resolution at
# release time. The published bytes are therefore identical to what is reviewed in
# the repo, and Packagist is not in the release-time trust path. (This pipeline is
# the plugin's trust boundary: its output auto-installs on every site.)
#
# Fork knob: PLUGIN_SLUG is the plugin's folder/main-file/zip name. A fork that
# renames the plugin changes it here; the runtime updater derives the same value
# from the installed folder, so the two stay in sync.
#
# Actions are pinned to a full commit SHA (Dependabot bumps them, keeping the
# version in the trailing comment) so a moved tag cannot inject code into a job
# that holds a contents:write token.

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write # create the Release and upload the asset

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Build and publish plugin zip
    runs-on: ubuntu-latest
    env:
      PLUGIN_SLUG: force-email-two-factor
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Verify tag matches the plugin Version header
        run: |
          tag="${GITHUB_REF_NAME#v}"
          header="$(sed -n 's/^[[:space:]]*\*[[:space:]]*Version:[[:space:]]*//p' "${PLUGIN_SLUG}.php" | head -n1 | tr -d '[:space:]')"
          echo "Tag version:    ${tag}"
          echo "Header version: ${header}"
          if [ "${tag}" != "${header}" ]; then
            echo "::error::Tag ${GITHUB_REF_NAME} does not match Version: ${header} in ${PLUGIN_SLUG}.php. Bump the header (and FORCE_2FA_LOADED / readme.txt Stable tag) before tagging."
            exit 1
          fi

      - name: Build plugin zip
        run: |
          # git archive honours .gitattributes export-ignore (strips tests/,
          # .github/, composer.* etc.) and includes the committed vendored updater
          # under vendor/yahnis-elsts/. No Composer step is needed.
          git archive --format=zip --prefix="${PLUGIN_SLUG}/" -o "${PLUGIN_SLUG}.zip" HEAD
          echo "Zip contents (tail):"
          unzip -l "${PLUGIN_SLUG}.zip" | tail -n 20
          # Fail loudly if the updater did not make it into the payload.
          unzip -l "${PLUGIN_SLUG}.zip" | grep -q "vendor/yahnis-elsts/plugin-update-checker/plugin-update-checker.php" \
            || { echo "::error::Plugin Update Checker missing from zip"; exit 1; }

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${GITHUB_REF_NAME}"
          if gh release view "${tag}" >/dev/null 2>&1; then
            gh release upload "${tag}" "${PLUGIN_SLUG}.zip" --clobber
          else
            gh release create "${tag}" "${PLUGIN_SLUG}.zip" \
              --title "${tag}" \
              --generate-notes
          fi
