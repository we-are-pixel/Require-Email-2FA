name: CI

on:
  push:
    branches: [ main ]
  pull_request:

permissions:
  contents: read

jobs:
  lint:
    name: Lint (PHP ${{ matrix.php }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: [ '7.2', '7.4', '8.0', '8.1', '8.2', '8.3', '8.4' ]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none
      - name: php -l all PHP files (excluding vendor)
        run: |
          find . -path ./vendor -prune -o -name '*.php' -print0 \
            | xargs -0 -n1 -P4 php -l

  coding-standards:
    name: PHPCS / PHPCompatibility
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # v2
        with:
          php-version: '8.3'
          coverage: none
          tools: composer:v2
      - name: Install dependencies
        run: composer install --no-interaction --no-progress --prefer-dist
      - name: PHPCS (PHPCompatibility, testVersion 7.2-)
        run: vendor/bin/phpcs

  phpstan:
    name: PHPStan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # v2
        with:
          php-version: '8.3'
          coverage: none
          tools: composer:v2
      - name: Install dependencies
        run: composer install --no-interaction --no-progress --prefer-dist
      - name: PHPStan (level 5)
        run: composer phpstan

  test:
    name: Unit + integration tests (PHP ${{ matrix.php }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: [ '8.2', '8.3', '8.4' ]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none
          tools: composer:v2
      - name: Install dependencies
        run: composer install --no-interaction --no-progress --prefer-dist
      - name: PHPUnit (unit + integration)
        run: vendor/bin/phpunit
      - name: PHPUnit (Two Factor absent fail-safe)
        run: vendor/bin/phpunit -c phpunit-no-two-factor.xml.dist

  coverage:
    name: Coverage (PHP 8.3)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # v2
        with:
          php-version: '8.3'
          coverage: pcov
          tools: composer:v2
      - name: Install dependencies
        run: composer install --no-interaction --no-progress --prefer-dist
      - name: PHPUnit with coverage
        run: |
          vendor/bin/phpunit --coverage-text --coverage-clover=coverage.xml | tee coverage.txt
          # The Two-Factor-absent suite covers branches unreachable under the default
          # bootstrap; include its clover so the ratchet sees combined coverage.
          vendor/bin/phpunit -c phpunit-no-two-factor.xml.dist --coverage-clover=coverage-no-two-factor.xml
          {
            echo '### Code coverage'
            echo '```'
            cat coverage.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Enforce coverage floor
        # Conservative starting floor: the untestable glue is @codeCoverageIgnore'd,
        # so the counted lines are almost entirely tested. Raise this toward the
        # actual combined figure (see the step summary above) as a ratchet.
        run: php bin/coverage-threshold.php 80 coverage.xml coverage-no-two-factor.xml
      - name: Upload coverage artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: coverage-clover
          path: |
            coverage.xml
            coverage-no-two-factor.xml

  playground-integration:
    name: Playground integration (real Two Factor)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: '20'
      - name: Boot real WordPress + Two Factor, assert enforcement end-to-end
        run: |
          rm -f .ci-result
          npx --yes @wp-playground/cli@3.1.43 run-blueprint \
            --blueprint=playground/ci-blueprint.json \
            --mount="$PWD:/wordpress/wp-content/plugins/force-email-two-factor"
          echo "Assertion result: $(cat .ci-result 2>/dev/null || echo MISSING)"
          test "$(cat .ci-result 2>/dev/null)" = "FORCE2FA_ASSERT_OK"

  multisite-e2e:
    name: Multisite E2E (network-only)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # v2
        with:
          php-version: '8.3'
          coverage: none
          extensions: sqlite3, pdo_sqlite
      - name: Real WordPress multisite, network-only behavior end-to-end
        run: bash bin/multisite-e2e.sh

  api-login-e2e:
    name: API-login E2E (real Two Factor)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # v2
        with:
          php-version: '8.3'
          coverage: none
          extensions: sqlite3, pdo_sqlite
      - name: Real WordPress + Two Factor, API-login allowlist end-to-end
        run: bash bin/api-login-e2e.sh

  install-handler-e2e:
    name: Install-handler E2E (one-click install)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # v2
        with:
          php-version: '8.3'
          coverage: none
          extensions: sqlite3, pdo_sqlite
      - name: Real WordPress, one-click Two Factor install handler end-to-end
        run: bash bin/install-handler-e2e.sh

  update-e2e:
    name: Update E2E (GitHub Releases)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # v2
        with:
          php-version: '8.3'
          coverage: none
          extensions: sqlite3, pdo_sqlite
      - name: Real WordPress update from GitHub Release asset
        run: bash bin/update-e2e.sh
        env:
          # Authenticated GitHub API calls (script + Plugin Update Checker):
          # anonymous requests share a ~60/hr per-IP quota across hosted runners.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # A latest release without the zip asset is external release state a PR
          # cannot influence — skip with a warning on PRs, hard-fail on main.
          FORCE2FA_UPDATE_E2E_TOLERATE_MISSING_ASSET: ${{ github.event_name == 'pull_request' && '1' || '0' }}
