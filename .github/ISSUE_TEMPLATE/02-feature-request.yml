name: Feature request
description: Suggest a focused improvement
title: "[Feature]: "
labels: ["enhancement", "triage"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem or use case
      description: What operational or security need would this address?
    validations:
      required: true
  - type: textarea
    id: proposed
    attributes:
      label: Proposed solution
      description: Describe the smallest change that would solve it.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Existing filters, mu-plugin snippets, or operational workarounds you considered.
    validations:
      required: false
  - type: checkboxes
    id: constraints
    attributes:
      label: Constraints
      options:
        - label: This should preserve existing stronger factors and backup codes.
          required: true
        - label: This should not weaken API-login allowlist + Application Password behavior.
          required: true
        - label: I understand this plugin intentionally avoids a settings UI unless strongly justified.
          required: true
